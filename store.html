<!DOCTYPE html>

<head>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0b1118;
color:white;
overflow-x:hidden;
}

/* Animated Background */
.bg{
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:rgba(108,255,143,0.08);
filter:blur(120px);
z-index:-1;
animation:float 10s ease-in-out infinite;
}

.bg:nth-child(1){
top:-150px;
left:-100px;
}

.bg:nth-child(2){
bottom:-150px;
right:-100px;
animation-delay:3s;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(40px);}
100%{transform:translateY(0);}
}

/* Navbar */
nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
display:flex;
align-items:center;
}

.logo span{
color:white;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav a{
text-decoration:none;
color:white;
transition:0.3s;
}

nav a:hover{
color:#6CFF8F;
}

/* Container */
.container{
max-width:1200px;
margin:0 auto;
padding:120px 8% 80px;
}

h1{
font-size:48px;
margin-bottom:50px;
}

h1 span{
color:#6CFF8F;
}

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
margin-bottom:80px;
}

.project-card{
background:rgba(255,255,255,0.03);
border-radius:24px;
border:1px solid rgba(255,255,255,0.05);
overflow:hidden;
transition:0.4s;
}

.project-card:hover{
transform:translateY(-10px);
border-color:#6CFF8F;
box-shadow:0 0 30px rgba(108,255,143,0.15);
}

.project-image{
width:100%;
height:280px;
background:rgba(108,255,143,0.1);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#6CFF8F;
overflow:hidden;
}

.project-image img{
width:100%;
height:100%;
object-fit:cover;
transition:0.6s;
}

.project-card:hover .project-image img{
transform:scale(1.1);
}

.project-info{
padding:30px;
}

.project-info h3{
font-size:24px;
margin-bottom:15px;
color:#6CFF8F;
}

.project-info p{
color:#cbd5e1;
line-height:1.7;
margin-bottom:15px;
}

.project-year{
color:#94a3b8;
font-size:14px;
}

/* Button */
.btn{
display:inline-block;
padding:14px 30px;
background:#6CFF8F;
color:black;
border-radius:12px;
text-decoration:none;
font-weight:600;
margin-top:40px;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
}

/* Footer */
footer{
padding:35px;
text-align:center;
color:#94a3b8;
border-top:1px solid rgba(255,255,255,0.05);
margin-top:50px;
}

/* Mobile */

menu-toggle{
    display:none;
    font-size:32px;
    cursor:pointer;
    color:white;
}

@media(max-width:900px){

.menu-toggle{
    display:block;
}

nav ul{
    position:absolute;
    top:80px;
    left:0;
    width:100%;
    background:#111;
    flex-direction:column;
    align-items:center;
    padding:20px 0;

    display:none;
}

nav ul.active{
    display:flex;
}
}
@media(max-width:600px){

h1{
font-size:36px;
}

nav ul{
display:none;
}
}
</style>
</head>
