<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thai Green Compliance Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="sy.css">
</head>

<body>

<div class="bg"></div>
<div class="bg"></div>

<!-- =========================
     NAVBAR
========================= -->
<header class="top-navbar">

    <a href="index.html" class="nav-logo">
        <img src="./รูป/logo.png" alt="Thai Green Compliance">
        <span>Thai Green Compliance</span>
    </a>

    <button class="menu-toggle" id="menuToggle" type="button">
        ☰
    </button>

    <nav class="nav-menu" id="navMenu">
        <a href="index.html#home">Home</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#about">About</a>
        <a href="projects.html">Projects</a>
        <a href="index.html#contact">Contact</a>
        <a href="shop.html" class="active">Store</a>
    </nav>

    <!-- LOGIN / USER STATUS -->
    <div class="auth-box">

        <!-- ยังไม่ Login -->
        <form id="loginForm" class="auth-form">
            <input id="loginEmail" type="email" placeholder="Email" required>
            <input id="loginPassword" type="password" placeholder="Password" required>

            <button class="auth-btn" type="submit">
                Login
            </button>

            <a class="register-link" href="register.html">
                Register
            </a>
        </form>

        <!-- Login แล้ว -->
        <div id="userBox" class="user-box">
            <span id="userEmail" class="user-email"></span>

            <button id="logoutBtn" class="logout-btn" type="button">
                Logout
            </button>
        </div>

    </div>

</header>

<!-- =========================
     SHOP CONTENT
========================= -->
<main class="container">

    <h1>🛒 Thai Green Compliance Store</h1>

    <div class="cart-top">
        <a class="cart-float" href="cart.html" aria-label="ไปตะกร้า">
            🛒
        </a>
    </div>

    <div id="products" class="projects-grid"></div>

</main>

<footer>
© 2026 Thai Green Compliance — All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="shop.js"></script>

</body>
</html>
