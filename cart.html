<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🛒 ตะกร้าสินค้า</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="cart.css">
</head>

<body>

<div class="cart-bg cart-bg-one"></div>
<div class="cart-bg cart-bg-two"></div>

<main class="cart-page">

    <div class="cart-header">
        <a href="shop.html" class="shop-link">
            ← กลับร้านค้า
        </a>

        <div class="cart-title-box">
            <span class="cart-icon">🛒</span>
            <h1>ตะกร้าสินค้า</h1>
            <p>ตรวจสอบรายการสินค้าก่อนดำเนินการสั่งซื้อ</p>
        </div>
    </div>

    <section class="cart-container">

        <div id="cartItems" class="cart-list"></div>

        <div class="checkout-panel">

            <div class="total-box" id="total">
                ยอดรวมทั้งหมด : 0 บาท
            </div>

            <div class="buttons">

                <button class="btn clear-btn" onclick="clearCart()">
                    🗑 ล้างตะกร้า
                </button>

                <button class="btn checkout-btn" onclick="goCheckout()">
                    📦 ดำเนินการสั่งซื้อ
                </button>

            </div>
        </div>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];


/* =========================
   SAFE TEXT
========================= */

function escapeHTML(value){

    return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

}


/* =========================
   GO CHECKOUT
========================= */

async function goCheckout(){

    const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){

        alert(
        "กรุณาเพิ่มสินค้าลงตะกร้าก่อน\nPlease add products to your cart first."
        );

        return;

    }

    if(typeof supabaseClient === "undefined"){

        alert(
        "ไม่พบระบบ Login กรุณากลับไปหน้าร้านค้าเพื่อล็อคอินก่อน"
        );

        window.location.href =
        "shop.html";

        return;

    }

    const {
        data:{ user },
        error
    } =
    await supabaseClient.auth.getUser();

    if(error){
        console.error(error);
    }

    if(!user){

        alert(
        "กรุณา Login ก่อนดำเนินการสั่งซื้อ\nPlease login before checkout."
        );

        window.location.href =
        "shop.html";

        return;

    }

    window.location.href =
    "checkout.html";

}


/* =========================
   RENDER CART
========================= */

function renderCart(){

    const cartItems =
    document.getElementById("cartItems");

    const totalBox =
    document.getElementById("total");

    cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){

        cartItems.innerHTML = `
        <div class="empty">
            <div class="empty-icon">🛒</div>
            <h2>ไม่มีสินค้าในตะกร้า</h2>
            <p>กลับไปเลือกสินค้าในร้านค้าก่อนนะงับ</p>
            <a href="shop.html" class="empty-btn">ไปเลือกร้านค้า</a>
        </div>
        `;

        totalBox.innerHTML =
        "ยอดรวมทั้งหมด : 0 บาท";

        return;

    }

    cartItems.innerHTML =
    "";

    let total = 0;

    cart.forEach((item,index)=>{

        const price =
        Number(item.price) || 0;

        const qty =
        Number(item.qty) || 0;

        const subtotal =
        price * qty;

        total += subtotal;

        cartItems.innerHTML += `

        <div class="cart-item">

            <div class="item-left">

                <div class="item-number">
                    ${index + 1}
                </div>

                <div class="item-info">

                    <h3>${escapeHTML(item.name)}</h3>

                    <div class="item-meta">
                        <span>ราคา : ${price.toLocaleString()} บาท</span>
                        <span>จำนวน : ${qty} ชิ้น</span>
                    </div>

                    <p class="item-subtotal">
                        รวมรายการนี้ :
                        <strong>${subtotal.toLocaleString()} บาท</strong>
                    </p>

                </div>

            </div>

            <button
            class="delete-btn"
            onclick="removeItem(${index})">
                ❌ ลบ
            </button>

        </div>

        `;

    });

    totalBox.innerHTML =
    "ยอดรวมทั้งหมด : " +
    total.toLocaleString() +
    " บาท";

}


/* =========================
   REMOVE ITEM
========================= */

function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCart();

}


/* =========================
   CLEAR CART
========================= */

function clearCart(){

    if(cart.length === 0){

        alert("ยังไม่มีสินค้าในตะกร้า");

        return;

    }

    if(confirm("ต้องการล้างตะกร้าทั้งหมดหรือไม่?")){

        cart =
        [];

        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );

        renderCart();

    }

}


renderCart();

</script>

</body>
</html>
